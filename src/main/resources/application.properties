spring.application.name=pms

spring.datasource.url=jdbc:mysql://localhost:3306/pms
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=NewPassword123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
# dialect is auto-detected in Hibernate 6+

# Disable SpringDoc endpoints in production (set to false when deploying)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

